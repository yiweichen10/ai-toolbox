<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章标题 - AI工具宝箱</title>
    <meta name="description" content="文章描述">
    <meta name="keywords" content="关键词">
    <meta property="og:type" content="article">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #fafafa; color: #333; line-height: 1.8; }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
        .header-inner { max-width: 900px; margin: 0 auto; padding: 15px 20px; }
        .header h1 { color: #fff; font-size: 22px; }
        .header h1 span { font-size: 12px; opacity: 0.8; display: block; font-weight: normal; margin-top: 2px; }
        .header a { color: #fff; text-decoration: none; }

        .breadcrumb { max-width: 900px; margin: 0 auto; padding: 15px 20px; font-size: 13px; color: #999; }
        .breadcrumb a { color: #667eea; text-decoration: none; }

        .article-container { max-width: 900px; margin: 0 auto; padding: 0 20px 40px; }

        .article-header { background: #fff; border-radius: 16px; padding: 40px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .article-header .tag { display: inline-block; background: #667eea; color: #fff; padding: 3px 12px; border-radius: 12px; font-size: 13px; margin-bottom: 15px; }
        .article-header h2 { font-size: 30px; line-height: 1.4; margin-bottom: 15px; }
        .article-header .meta { display: flex; gap: 20px; font-size: 14px; color: #999; }
        .article-header .desc { margin-top: 15px; padding-top: 15px; border-top: 1px solid #f0f0f0; color: #666; font-size: 15px; }

        .article-body { background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .article-body h2 { font-size: 22px; color: #333; margin: 30px 0 15px; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0; }
        .article-body h3 { font-size: 18px; color: #333; margin: 20px 0 10px; }
        .article-body p { margin-bottom: 15px; color: #555; }
        .article-body ul, .article-body ol { margin: 10px 0 15px 20px; color: #555; }
        .article-body li { margin-bottom: 8px; }
        .article-body strong { color: #333; }
        .article-body table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        .article-body th, .article-body td { padding: 12px; border: 1px solid #e0e0e0; }
        .article-body th { background: #f5f5f5; text-align: left; }
        .article-body code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-size: 14px; }
        .article-body pre { background: #1a1a2e; color: #e0e0e0; padding: 20px; border-radius: 8px; overflow-x: auto; margin: 15px 0; line-height: 1.5; }
        .article-body pre code { background: none; padding: 0; color: inherit; }
        .article-body blockquote { border-left: 4px solid #667eea; padding: 15px 20px; margin: 15px 0; background: #f8f8ff; border-radius: 0 8px 8px 0; color: #555; }

        .toc { background: #f8f8ff; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #e8e8f0; }
        .toc h4 { margin-bottom: 10px; color: #333; }
        .toc ul { list-style: none; margin: 0; }
        .toc li { margin-bottom: 5px; }
        .toc a { color: #667eea; text-decoration: none; font-size: 14px; }
        .toc a:hover { text-decoration: underline; }

        .nav-buttons { display: flex; justify-content: space-between; gap: 20px; margin-top: 30px; }
        .nav-btn { flex: 1; padding: 15px 20px; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); text-decoration: none; color: #333; transition: all 0.3s; }
        .nav-btn:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); color: #667eea; }
        .nav-btn .label { font-size: 12px; color: #999; }
        .nav-btn .title { font-size: 15px; font-weight: 600; margin-top: 5px; }

        .footer { background: #1a1a2e; color: #8892a4; padding: 30px 20px; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/"><h1>🤖 AI工具宝箱 <span>每日更新 · 已收录 500+ 工具</span></h1></a>
        </div>
    </header>

    <nav class="breadcrumb" aria-label="面包屑导航">
        <a href="/">首页</a> &gt; <a href="/">文章</a> &gt; <span id="breadcrumbTitle">文章标题</span>
    </nav>

    <main class="article-container">
        <div class="article-header">
            <div class="tag" id="articleTag">分类</div>
            <h2 id="articleTitle">文章标题</h2>
            <div class="meta">
                <span id="articleDate">📅 日期</span>
                <span>⏱️ 阅读约 8 分钟</span>
                <span>👁️ 浏览</span>
            </div>
            <div class="desc" id="articleDesc">文章描述</div>
        </div>

        <div class="toc" id="toc">
            <h4>📋 文章目录</h4>
            <ul id="tocList"></ul>
        </div>

        <article class="article-body" id="articleBody">
            <!-- JS渲染 -->
        </article>

        <div class="nav-buttons" id="navButtons">
            <!-- JS渲染 -->
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 AI工具宝箱 · 每日精选优质AI工具</p>
    </footer>

    <script>
        // 根据当前路径加载对应文章
        const pathParts = window.location.pathname.split('/');
        const slug = pathParts[pathParts.length - 2] || 'ai-tools-2026';

        fetch('/data/articles.json')
            .then(r => r.json())
            .then(articles => {
                const article = articles.find(a => a.slug === slug);
                if (!article) {
                    document.getElementById('articleBody').innerHTML = '<p>文章未找到</p>';
                    return;
                }
                renderArticle(article, articles);
            })
            .catch(() => {
                document.getElementById('articleBody').innerHTML = '<p>加载失败</p>';
            });

        function renderArticle(article, allArticles) {
            // 设置meta
            document.title = article.title + ' - AI工具宝箱';
            document.querySelector('meta[name="description"]').content = article.description;
            document.querySelector('meta[name="keywords"]').content = article.keywords;
            document.getElementById('breadcrumbTitle').textContent = article.title;
            document.getElementById('articleTag').textContent = article.category;
            document.getElementById('articleTitle').textContent = article.title;
            document.getElementById('articleDate').textContent = '📅 ' + article.dateFull;
            document.getElementById('articleDesc').textContent = article.description;

            // 渲染Markdown内容（简易转换）
            let html = markdownToHtml(article.content);
            document.getElementById('articleBody').innerHTML = html;

            // 生成目录
            generateToc();

            // 上下篇导航
            renderNav(article, allArticles);

            // 结构化数据
            addStructuredData(article);
        }

        function markdownToHtml(md) {
            let html = md
                // 标题
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                // 粗体
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                // 行内代码
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // 代码块
                .replace(/```[\s\S]*?```/g, match => {
                    const code = match.replace(/```\w*\n?/, '').replace(/```$/, '');
                    return '<pre><code>' + escapeHtml(code) + '</code></pre>';
                })
                // 表格
                .replace(/\n(\|.+\|)\n(\|[-:| ]+\|)\n((?:\|.+\|\n?)+)/g, (match, header, sep, body) => {
                    const headers = header.split('|').filter(c => c.trim());
                    const rows = body.trim().split('\n');
                    let table = '<table><thead><tr>';
                    headers.forEach(h => table += '<th>' + h.trim() + '</th>');
                    table += '</tr></thead><tbody>';
                    rows.forEach(row => {
                        const cells = row.split('|').filter(c => c.trim());
                        table += '<tr>';
                        cells.forEach(c => table += '<td>' + c.trim() + '</td>');
                        table += '</tr>';
                    });
                    table += '</tbody></table>';
                    return table;
                })
                // 引用块
                .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
                // 无序列表
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                // 有序列表
                .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
                // 段落
                .replace(/\n\n(?!<)/g, '\n</p><p>\n')
                // 合并相邻li
                .replace(/<\/p>\s*<li>/g, '<li>')
                .replace(/<\/li>\s*<p>/g, '</li>');

            // 包裹在段落中
            if (!html.startsWith('<')) html = '<p>' + html + '</p>';
            return html;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function generateToc() {
            const headings = document.querySelectorAll('.article-body h2, .article-body h3');
            const tocList = document.getElementById('tocList');
            if (headings.length === 0) { document.getElementById('toc').style.display = 'none'; return; }
            headings.forEach((h, i) => {
                h.id = 'heading-' + i;
                const indent = h.tagName === 'H3' ? 'padding-left:20px;' : '';
                tocList.innerHTML += `<li style="${indent}"><a href="#heading-${i}">${h.textContent}</a></li>`;
            });
        }

        function renderNav(article, allArticles) {
            const idx = allArticles.findIndex(a => a.slug === article.slug);
            const prev = idx > 0 ? allArticles[idx - 1] : null;
            const next = idx < allArticles.length - 1 ? allArticles[idx + 1] : null;
            let html = '';
            if (prev) html += `<a href="/articles/${prev.slug}/index.html" class="nav-btn"><div class="label">← 上一篇</div><div class="title">${prev.title}</div></a>`;
            else html += '<div></div>';
            if (next) html += `<a href="/articles/${next.slug}/index.html" class="nav-btn" style="text-align:right;"><div class="label">下一篇 →</div><div class="title">${next.title}</div></a>`;
            document.getElementById('navButtons').innerHTML = html;
        }

        function addStructuredData(article) {
            const script = document.createElement('script');
            script.type = 'application/ld+json';
            script.textContent = JSON.stringify({
                "@context": "https://schema.org",
                "@type": "Article",
                "headline": article.title,
                "description": article.description,
                "datePublished": article.dateFull,
                "author": { "@type": "Organization", "name": "AI工具宝箱" },
                "publisher": { "@type": "Organization", "name": "AI工具宝箱" }
            });
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
