<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具评测 - AI工具宝箱</title>
    <meta name="description" content="AI工具详细评测，包含功能特性、优缺点分析、使用技巧和版本对比。">
    <meta name="keywords" content="AI工具评测,AI工具对比">
    <meta property="og:type" content="article">
    <link rel="stylesheet" href="/css/style.css">
    <script type="application/ld+json" id="structuredData">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Web",
        "description": ""
    }
    </script>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" style="text-decoration:none;"><h1>&#x1F6E0;&#xFE0F; AI工具宝箱 <span>每日更新 · 已收录 500+ 工具</span></h1></a>
        </div>
    </header>

    <nav class="breadcrumb" aria-label="面包屑导航">
        <a href="/">首页</a> &gt; <a href="/" id="bcCategory">分类</a> &gt; <span id="bcName">工具名</span>
    </nav>

    <main class="article-container">
        <div class="tool-header">
            <div class="tool-header-top">
                <div class="tool-icon-lg" id="toolIcon"></div>
                <div class="tool-header-info">
                    <h2 id="toolName"></h2>
                    <p class="subtitle" id="toolDesc"></p>
                    <div class="rating-bar" id="toolRating"></div>
                </div>
            </div>
            <div class="tool-meta" id="toolMeta"></div>
            <div class="action-bar">
                <a href="#" id="toolUrl" target="_blank" rel="noopener" class="action-btn action-btn-primary">立即使用 →</a>
            </div>
        </div>

        <div class="features-grid" id="toolFeatures"></div>

        <article class="article-body" id="toolContent"></article>

        <div class="pros-cons" id="toolProsCons" style="display:none;">
            <div class="pros">
                <h4>&#x1F44D; 优点</h4>
                <ul id="prosList"></ul>
            </div>
            <div class="cons">
                <h4>&#x1F44E; 缺点</h4>
                <ul id="consList"></ul>
            </div>
        </div>

        <div class="related-tools" id="relatedSection" style="display:none;">
            <h3>&#x1F517; 相关工具推荐</h3>
            <div class="related-grid" id="relatedGrid"></div>
        </div>
    </main>

    <footer class="footer">
        <p>&#x00A9; 2026 AI工具宝箱 · 每日精选优质AI工具</p>
    </footer>

    <script>
        const pathParts = window.location.pathname.split('/');
        const slug = pathParts[pathParts.length - 2] || 'chatgpt';

        fetch('/data/tools.json')
            .then(r => r.json())
            .then(tools => {
                const tool = tools.find(t => t.slug === slug);
                if (!tool) {
                    document.getElementById('toolContent').innerHTML = '<p>工具未找到</p>';
                    return;
                }
                renderTool(tool, tools);
            })
            .catch(() => {
                document.getElementById('toolContent').innerHTML = '<p>加载失败</p>';
            });

        function renderTool(tool, allTools) {
            // Meta
            document.title = tool.name + '评测 - AI工具宝箱';
            document.querySelector('meta[name="description"]').content = tool.name + '全面评测：' + tool.description;
            document.querySelector('meta[name="keywords"]').content = tool.name + '评测,' + tool.name + '使用教程,' + tool.category + '工具';
            document.querySelector('meta[property="og:title"]').content = tool.name + '评测 - AI工具宝箱';

            // Structured data
            const sd = JSON.parse(document.getElementById('structuredData').textContent);
            sd.name = tool.name;
            sd.description = tool.description;
            sd.operatingSystem = tool.platform || 'Web';
            document.getElementById('structuredData').textContent = JSON.stringify(sd);

            // Breadcrumb
            document.getElementById('bcCategory').textContent = tool.category;
            document.getElementById('bcName').textContent = tool.name;

            // Header
            document.getElementById('toolIcon').style.background = tool.color;
            document.getElementById('toolIcon').textContent = tool.emoji;

            let nameHtml = tool.name;
            if (tool.badge) {
                const badgeColor = tool.badge.type === 'hot' ? '#ff4444' : tool.badge.type === 'new' ? '#00aa00' : '#667eea';
                nameHtml += ' <span class="badge" style="background:' + badgeColor + ';color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;">' + tool.badge.text + '</span>';
            }
            document.getElementById('toolName').innerHTML = nameHtml;
            document.getElementById('toolDesc').textContent = tool.description;
            document.getElementById('toolRating').innerHTML = tool.rating + ' <span style="font-size:14px;color:#999;">(' + tool.visits + '浏览)</span>';

            // Meta info
            let metaHtml = '';
            metaHtml += '<div class="tool-meta-item">&#x1F310; <strong>官网</strong>：' + tool.url.replace('https://', '') + '</div>';
            metaHtml += '<div class="tool-meta-item">&#x1F4B0; <strong>价格</strong>：' + tool.price + '</div>';
            if (tool.platform) {
                metaHtml += '<div class="tool-meta-item">&#x1F4E6; <strong>平台</strong>：' + tool.platform + '</div>';
            }
            metaHtml += '<div class="tool-meta-item">&#x1F3F7;&#xFE0F; <strong>分类</strong>：' + tool.category + '</div>';
            document.getElementById('toolMeta').innerHTML = metaHtml;

            // URL
            document.getElementById('toolUrl').href = tool.url;

            // Features
            if (tool.features && tool.features.length > 0) {
                let fHtml = '';
                tool.features.forEach(f => {
                    fHtml += '<div class="feature-item">' + f + '</div>';
                });
                document.getElementById('toolFeatures').innerHTML = fHtml;
            }

            // Content (Markdown to HTML)
            if (tool.content) {
                document.getElementById('toolContent').innerHTML = markdownToHtml(tool.content);
            }

            // Pros/Cons (use separate section, not from content)
            if (tool.pros && tool.cons) {
                document.getElementById('toolProsCons').style.display = 'grid';
                document.getElementById('prosList').innerHTML = tool.pros.map(p => '<li>' + p + '</li>').join('');
                document.getElementById('consList').innerHTML = tool.cons.map(c => '<li>' + c + '</li>').join('');
            }

            // Related tools
            if (tool.related && tool.related.length > 0) {
                document.getElementById('relatedSection').style.display = 'block';
                let rHtml = '';
                tool.related.forEach(rSlug => {
                    const r = allTools.find(t => t.slug === rSlug);
                    if (r) {
                        rHtml += '<a href="/tools/' + r.slug + '/index.html" class="related-card">';
                        rHtml += '<div style="font-size:24px;margin-bottom:8px;">' + r.emoji + '</div>';
                        rHtml += '<div style="font-weight:600;">' + r.name + '</div>';
                        rHtml += '<div style="font-size:13px;color:#666;">' + r.category + '</div>';
                        rHtml += '</a>';
                    }
                });
                document.getElementById('relatedGrid').innerHTML = rHtml;
            }
        }

        function markdownToHtml(md) {
            return md
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/```[\s\S]*?```/g, function(match) {
                    var code = match.replace(/```\w*\n?/, '').replace(/```$/, '');
                    return '<pre><code>' + code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>';
                })
                .replace(/\n(\|.+\|)\n(\|[-:| ]+\|)\n((?:\|.+\|\n?)+)/g, function(match, header, sep, body) {
                    var headers = header.split('|').filter(function(c){return c.trim();});
                    var rows = body.trim().split('\n');
                    var table = '<table><thead><tr>';
                    headers.forEach(function(h){table += '<th>' + h.trim() + '</th>';});
                    table += '</tr></thead><tbody>';
                    rows.forEach(function(row){
                        var cells = row.split('|').filter(function(c){return c.trim();});
                        table += '<tr>';
                        cells.forEach(function(c){table += '<td>' + c.trim() + '</td>';});
                        table += '</tr>';
                    });
                    table += '</tbody></table>';
                    return table;
                })
                .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
                .replace(/\n\n(?!<)/g, '\n</p><p>\n')
                .replace(/<\/p>\s*<li>/g, '<li>')
                .replace(/<\/li>\s*<p>/g, '</li>');
        }
    </script>
</body>
</html>
