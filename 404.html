<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - AI工具宝箱</title>
    <meta name="description" content="你访问的页面不存在，返回AI工具宝箱首页探索优质AI工具。">
    <meta name="robots" content="noindex, follow">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-404 {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
            padding: 40px 20px;
        }
        .error-404 .error-code {
            font-size: 120px;
            font-weight: 900;
            background: var(--bg-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }
        .error-404 .error-emoji {
            font-size: 48px;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .error-404 h1 {
            font-size: 24px;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .error-404 .error-desc {
            font-size: 16px;
            color: var(--text-muted);
            max-width: 480px;
            line-height: 1.7;
            margin-bottom: 28px;
        }
        .error-404 .error-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .error-404 .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: var(--bg-gradient);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(79,70,229,0.3);
        }
        .error-404 .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79,70,229,0.4);
            color: #fff;
        }
        .error-404 .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: var(--surface-bg);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border-radius: var(--radius-sm);
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .error-404 .btn-back:hover {
            background: #f1f5f9;
            color: var(--text-main);
        }
        .error-404 .error-suggest {
            margin-top: 40px;
            padding-top: 28px;
            border-top: 1px solid #e2e8f0;
            max-width: 480px;
        }
        .error-404 .error-suggest h3 {
            font-size: 15px;
            color: var(--text-main);
            margin-bottom: 14px;
        }
        .error-404 .error-suggest a {
            display: block;
            padding: 10px 16px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            border-radius: var(--radius-sm);
            transition: background 0.15s;
        }
        .error-404 .error-suggest a:hover {
            background: var(--body-bg);
            color: var(--primary-color);
        }
        @media (max-width: 480px) {
            .error-404 .error-code { font-size: 80px; }
            .error-404 h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="error-404">
        <div class="error-emoji">🔍</div>
        <div class="error-code">404</div>
        <h1>页面走丢了</h1>
        <p class="error-desc">你访问的页面可能已被移动、删除，或者从未存在。别担心，试试下面的链接找到你需要的AI工具。</p>
        <div class="error-actions">
            <a href="/" class="btn-home">🏠 返回首页</a>

        </div>
        <div class="error-suggest">
            <h3>你可能想去这些页面：</h3>
            <a href="/ranking/">📊 AI工具排行榜</a>

    <footer class="footer">

    </footer>
</body>
</html>
