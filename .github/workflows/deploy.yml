name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Rsync deploy (incremental)
        env:
          SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='.git' \
            --exclude='*.bak' \
            --exclude='*.md' \
            --exclude='data/' \
            --exclude='scripts/' \
            --exclude='images/' \
            --exclude='_archive/' \
            --exclude='backup/' \
            --exclude='__pycache__/' \
            --exclude='.github/' \
            --exclude='vercel.json' \
            -e "ssh $SSH_OPTS" \
            ./  root@121.43.144.99:/var/www/aitoollab/html/
