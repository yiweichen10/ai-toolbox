# AI工具宝箱 - Nginx 安全头配置
# 部署位置：/etc/nginx/conf.d/security-headers.conf
# 作用：添加 HTTP 安全响应头，提升安全评分
# 部署方法：复制到服务器 /etc/nginx/conf.d/ 后执行 nginx -s reload

# HSTS：强制浏览器使用 HTTPS（1年有效期，含子域名，预加载列表）
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# 防止 MIME 类型嗅探
add_header X-Content-Type-Options "nosniff" always;

# 防止点击劫持（禁止被 iframe 嵌套）
add_header X-Frame-Options "SAMEORIGIN" always;

# XSS 保护（旧版浏览器兼容）
add_header X-XSS-Protection "1; mode=block" always;

# 引用来源策略：只发送同源引用
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# 内容安全策略（CSP）- 允许内联样式/脚本（静态站需要）
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://hm.baidu.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'" always;

# 权限策略：禁用不必要的浏览器功能
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
